name: Pipeline de Testes de Seguranca (RA2)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      # --- ETAPA 1: SAST (Semgrep Oficial) ---
      # Esta action oficial integrada já envia os resultados direto para a aba 
      # "Security" do seu GitHub e para o painel do Semgrep se estiver vinculado.
      - name: Executar Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: local:.semgrep/rules.yml

      # --- ETAPA 2: SCA (FOSSA Oficial) ---
      - name: Executar FOSSA Scan (SCA)
        uses: fossa-contrib/fossa-action@v1
        with:
          fossa-api-key: ${{ secrets.FOSSA_API_KEY }}